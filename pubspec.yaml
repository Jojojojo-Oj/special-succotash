  permission_handler: ^11.3.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0
  video_player: ^2.9.1
  geocoding: ^4.0.0


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_logo.png"

dev_dependencies:
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


